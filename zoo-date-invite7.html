<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🐭 Zoo Mouse? 🐭</title>

<!-- Cute rounded Google Fonts: Baloo 2 for big playful headings, Quicksand for body text -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">

<style>
  /* ============================================================
     DESIGN TOKENS — tweak these to re-skin the whole page
     ============================================================ */
  :root{
    --pink:        #ffd7e6;   /* light pink   */
    --pink-deep:   #ff8fb3;   /* buttons/accents */
    --pink-deeper: #ff6a9c;   /* hover state */
    --cream:       #fff8ef;   /* background base */
    --blue:        #cdeaf9;   /* light blue */
    --blue-deep:   #a9dcf2;
    --text-main:   #6a4a57;   /* soft plum-brown, readable on pastels */
    --white:       #ffffff;
    --shadow:      0 8px 24px rgba(255, 140, 170, 0.25);
    --radius-lg:   22px;
    --radius-pill: 999px;
  }

  * { box-sizing: border-box; }

  html, body{
    margin: 0;
    padding: 0;
    height: 100%;
    overflow-x: hidden;
  }

  body{
    font-family: 'Quicksand', sans-serif;
    color: var(--text-main);
    min-height: 100vh;
    /* Soft dreamy pastel gradient backdrop */
    background: linear-gradient(160deg, var(--cream) 0%, var(--pink) 55%, var(--blue) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* ============================================================
     DECORATIVE BACKGROUND BLOBS (signature soft, organic shapes)
     ============================================================ */
  .blob{
    position: fixed;
    border-radius: 50%;
    filter: blur(40px);
    opacity: 0.55;
    z-index: 0;
    pointer-events: none;
  }
  .blob--1{ width: 320px; height: 320px; top: -80px; left: -100px; background: var(--blue-deep); }
  .blob--2{ width: 260px; height: 260px; bottom: -60px; right: -80px; background: var(--pink-deep); }
  .blob--3{ width: 180px; height: 180px; top: 40%; right: -60px; background: var(--pink); }

  /* ============================================================
     FLOATING HEARTS (ambient background animation)
     ============================================================ */
  #hearts-container{
    position: fixed;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 1;
  }
  .floating-heart{
    position: absolute;
    bottom: -10%;
    animation-name: floatUp;
    animation-timing-function: ease-in;
    animation-iteration-count: infinite;
    opacity: 0.8;
  }
  @keyframes floatUp{
    0%   { transform: translateY(0) translateX(0) rotate(0deg);   opacity: 0; }
    10%  { opacity: 0.85; }
    50%  { transform: translateY(-55vh) translateX(15px) rotate(10deg); }
    100% { transform: translateY(-110vh) translateX(-15px) rotate(-8deg); opacity: 0; }
  }

  /* ============================================================
     MAIN CARD
     ============================================================ */
  .card{
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 480px;
    margin: 24px;
    padding: clamp(24px, 5vw, 44px);
    background: rgba(255, 255, 255, 0.72);
    backdrop-filter: blur(6px);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
    text-align: center;
    animation: fadeIn 0.9s ease both;
  }

  /* Each screen (question / celebration) is its own flex column.
     THIS "gap" is what actually spaces out the GIF, text, and buttons —
     increase it for more breathing room between items, decrease for less. */
  .screen{
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 36px;
  }

  @keyframes fadeIn{
    from{ opacity: 0; transform: translateY(16px) scale(0.98); }
    to  { opacity: 1; transform: none; }
  }

  /* The cute GIF up top */
  .hero-gif{
    width: 180px;
    height: 180px;
    object-fit: cover;
    border-radius: 10%;
    border: 6px solid var(--white);
    box-shadow: 0 6px 18px rgba(255, 140, 170, 0.35);
  }

  /* Big playful question text */
  .question-text{
    font-family: 'Baloo 2', cursive;
    font-weight: 700;
    font-size: clamp(1.4rem, 5vw, 2rem);
    line-height: 1.35;
    margin: 0;
    white-space: pre-line; /* respects the \n line break in the JS text */
  }

  .subtext{
    font-size: clamp(0.95rem, 3vw, 1.1rem);
    font-weight: 600;
    color: var(--text-main);
    opacity: 0.85;
    margin: 0;
  }

  /* ============================================================
     BUTTONS
     ============================================================ */
  .button-row{
    display: flex;
    flex-wrap: wrap;
    align-items: center; /* stops buttons from stretching to fill min-height below */
    gap: 26px;
    justify-content: center;
    margin-top: 8px;
    min-height: 90px;
    width: 100%;
  }

  .btn{
    font-family: 'Baloo 2', cursive;
    font-size: clamp(1.1rem, 4vw, 1.35rem);
    font-weight: 700;
    border: none;
    border-radius: var(--radius-pill);
    padding: 16px 34px;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease, opacity 0.4s ease;
    will-change: transform;
  }
  .btn:hover{
    transform: scale(1.08);
    box-shadow: 0 10px 26px rgba(255, 120, 160, 0.4);
  }
  .btn:focus-visible{
    outline: 3px solid var(--blue-deep);
    outline-offset: 3px;
  }
  .btn:active{ transform: scale(0.96); }

  .btn-yes{
    background: var(--pink-deep);
    color: var(--white);
  }
  .btn-yes:hover{ background: var(--pink-deeper); }

  .btn-yes.btn-yes--eager{
    /* Applied once the No button has fully vanished */
    transform: scale(1.18);
    animation: pulse 1.4s ease-in-out infinite;
  }
  .btn-yes.btn-yes--eager:hover{ transform: scale(1.26); }

  @keyframes pulse{
    0%, 100% { box-shadow: 0 8px 24px rgba(255, 140, 170, 0.35); }
    50%      { box-shadow: 0 8px 34px rgba(255, 140, 170, 0.6); }
  }

  .btn-no{
    background: var(--blue);
    color: var(--text-main);
    /* Shrinks in place with each click via JS (transform: scale(...)) —
       it stays centered in the button row the whole time. */
  }
  .btn-no:hover{ background: var(--blue-deep); }

  .btn-calendar{
    display: inline-block;
    background: var(--blue);
    color: var(--text-main);
    text-decoration: none;
  }
  .btn-calendar:hover{ background: var(--blue-deep); }

  /* ============================================================
     CELEBRATION SCREEN
     ============================================================ */
  .hidden{ display: none !important; }

  .celebration-text{
    font-family: 'Baloo 2', cursive;
    font-weight: 700;
    font-size: clamp(1.3rem, 4.6vw, 1.9rem);
    line-height: 1.4;
    margin: 0;
    animation: fadeIn 0.8s ease both;
  }

  /* ============================================================
     CONFETTI
     ============================================================ */
  #confetti-container{
    position: fixed;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 5;
  }
  .confetti-piece{
    position: absolute;
    top: -10px;
    border-radius: 2px;
    animation-name: confettiFall;
    animation-timing-function: cubic-bezier(0.4, 0.0, 0.2, 1);
    animation-iteration-count: 1;
  }
  @keyframes confettiFall{
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(105vh) rotate(360deg); opacity: 0.9; }
  }

  /* Respect users who prefer reduced motion */
  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
  }

  @media (max-width: 380px){
    .hero-gif{ width: 140px; height: 140px; }
    .btn{ padding: 14px 26px; }
  }
</style>
</head>
<body>

  <!-- Soft decorative background blobs -->
  <div class="blob blob--1"></div>
  <div class="blob blob--2"></div>
  <div class="blob blob--3"></div>

  <!-- Floating hearts get injected here by JS -->
  <div id="hearts-container"></div>

  <!-- Confetti pieces get injected here by JS -->
  <div id="confetti-container"></div>

  <main class="card">

    <!-- ================= QUESTION SCREEN ================= -->
    <section id="question-screen" class="screen">

      <!-- 🖼️ REPLACE THIS: swap the src below with your own cute GIF URL -->
      <img
        id="hero-gif"
        class="hero-gif"
        src="https://i.giphy.com/aCSURh6OnUyXdOuYcq.webp"
        alt="A cute animated GIF"
      />

      <!-- ✏️ REPLACE THIS: edit the question text directly here (use \n in the JS version below if you generate it dynamically) -->
      <h1 class="question-text" id="question-text">Hi love ❤️
Would you like to go to the zoo with me this Friday? 🦁🐼🐵</h1>

      <div class="button-row" id="button-row">
        <button class="btn btn-yes" id="yes-btn" type="button">🐱 Yea!</button>
        <button class="btn btn-no" id="no-btn" type="button">😿 No.</button>
      </div>
    </section>

    <!-- ================= CELEBRATION SCREEN ================= -->
    <section id="celebration-screen" class="screen hidden">

      <!-- 🎉 REPLACE THIS: swap the src below with your own celebratory GIF URL -->
      <img
        id="celebration-gif"
        class="hero-gif"
        src="https://i.giphy.com/TbRkubcqlgBksEqMv4.webp"
        alt="A celebratory animated GIF"
      />

      <p class="celebration-text">Yippeee!!❤️ Finally i can see my mouse!! 🐭👉❤️     </p>
      <p class="subtext">───────────────────────────── Please text me when you want to go exactly! </p>

      <!-- 📅 REPLACE THIS: paste your Google Calendar event link into the href below -->
      <a
        id="calendar-btn"
        class="btn btn-calendar"
        href="https://calendar.app.google/iY73HC9cG5E6UwUaA"
        target="_blank"
        rel="noopener noreferrer"
      >📅 Add to Calendar</a>
    </section>

  </main>

  <!-- 🔊 REPLACE THIS: swap the src below with your own success sound file -->
  <audio id="success-sound" preload="auto">
    <source src="trumpet.mp3" type="audio/mpeg">
  </audio>

  <script>
  /* ================================================================
     CONFIG — the four things you're most likely to want to edit
     ================================================================ */
  const CONFIG = {
    // ✏️ Change the question shown at the top (use "\n" for a line break)
    questionText: "❤️ Hi Mouser! ❤️\n────────\nI really miss you, so how about we finally go to the zoo this Friday?\n🐁🐹🐈",

    // How many times the "No" button can be clicked before it vanishes
    noButtonMaxClicks: 5,

    // How much smaller the "No" button gets on each click (20% smaller)
    noButtonShrinkFactor: 0.8,

    confettiDurationMs: 5000,
    confettiPieceCount: 800,

    // 🔊 Volume of the trumpet/success sound when "Yes" is clicked (0 = silent, 1 = full volume)
    successSoundVolume: 0.4,

    // 🔈 Volume of the short click sound every button makes (0 = silent, 1 = full volume)
    clickSoundVolume: 0.12
  };

  // Apply the configurable question text on load
  document.getElementById('question-text').textContent = CONFIG.questionText;

  /* ================================================================
     BUTTON CLICK SOUND — a short, modern synthesized "tick"
     Generated in the browser with the Web Audio API, so there's no
     extra sound file to find, host, or link — it just works.
     ================================================================ */
  let clickAudioCtx = null;

  function playClickSound(){
    try {
      // Reuse one AudioContext across all clicks; some browsers require
      // it to be created/resumed from within a real user click, which is
      // exactly when this function runs.
      if (!clickAudioCtx){
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        clickAudioCtx = new AudioContextClass();
      }
      if (clickAudioCtx.state === 'suspended'){
        clickAudioCtx.resume();
      }

      const ctx = clickAudioCtx;
      const now = ctx.currentTime;

      const oscillator = ctx.createOscillator();
      const gainNode = ctx.createGain();

      // A quick downward pitch blip reads as a clean, modern UI "tick"
      oscillator.type = 'sine';
      oscillator.frequency.setValueAtTime(820, now);
      oscillator.frequency.exponentialRampToValueAtTime(420, now + 0.08);

      // Fast fade so it stays subtle and short, never overlapping the next click
      gainNode.gain.setValueAtTime(CONFIG.clickSoundVolume, now);
      gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.09);

      oscillator.connect(gainNode);
      gainNode.connect(ctx.destination);

      oscillator.start(now);
      oscillator.stop(now + 0.1);
    } catch (err) {
      // Silently ignore if Web Audio isn't supported — page keeps working fine
    }
  }

  // Play the click sound on every button/link styled with the .btn class
  // (covers Yes, No, and the calendar button — and any you add later)
  document.querySelectorAll('.btn').forEach((el) => {
    el.addEventListener('click', playClickSound);
  });

  /* ================================================================
     FLOATING HEARTS — ambient background animation
     ================================================================ */
  function createFloatingHearts(count = 38){
    const container = document.getElementById('hearts-container');
    const emojis = ['💕', '💖', '💗', '🦁', '🐻', '🦊','🦝', '🐼', '🐁', '🐹', '🐭'];

    for (let i = 0; i < count; i++){
      const heart = document.createElement('span');
      heart.className = 'floating-heart';
      heart.textContent = emojis[Math.floor(Math.random() * emojis.length)];

      const size = 14 + Math.random() * 22;           // 14px–36px
      const left = Math.random() * 100;                // 0%–100% across
      const duration = 6 + Math.random() * 5;          // 9s–19s float
      const delay = Math.random() * 10;                 // stagger start times

      heart.style.left = `${left}%`;
      heart.style.fontSize = `${size}px`;
      heart.style.animationDuration = `${duration}s`;
      heart.style.animationDelay = `${delay}s`;

      container.appendChild(heart);
    }
  }
  createFloatingHearts();

  /* ================================================================
     "NO" BUTTON — stays perfectly in place, just shrinks smaller and
     smaller with each click until it's gone after the 5th click
     ================================================================ */
  const noBtn = document.getElementById('no-btn');
  const yesBtn = document.getElementById('yes-btn');

  let noClicks = 0;
  let noScale = 1;

  noBtn.addEventListener('click', () => {
    noClicks++;

    // Shrink around its own center — since we only ever change `transform`
    // (never top/left/position), the button's layout space in the button
    // row never changes, so it stays centered right where it started.
    noScale *= CONFIG.noButtonShrinkFactor;
    noBtn.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
    noBtn.style.transform = `scale(${noScale})`;

    if (noClicks >= CONFIG.noButtonMaxClicks){
      // It's now tiny — fade the last bit of it away and remove it for good
      noBtn.style.opacity = '0';
      noBtn.addEventListener('transitionend', () => {
        noBtn.classList.add('hidden');
      }, { once: true });

      // Make "Yes" feel a little more inviting
      yesBtn.classList.add('btn-yes--eager');
    }
  });

  /* ================================================================
     "YES" BUTTON — reveals the celebration screen
     ================================================================ */
  const questionScreen = document.getElementById('question-screen');
  const celebrationScreen = document.getElementById('celebration-screen');
  const successSound = document.getElementById('success-sound');

  yesBtn.addEventListener('click', () => {
    questionScreen.classList.add('hidden');
    celebrationScreen.classList.remove('hidden');

    // Try to play the success sound — browsers allow this since it's triggered by a click
    successSound.currentTime = 0;
    successSound.volume = CONFIG.successSoundVolume;
    successSound.play().catch(() => {
      // Silently ignore if the placeholder sound can't load/play; page keeps working fine
    });

    launchConfetti();
  });

  /* ================================================================
     CONFETTI — a short celebratory burst
     ================================================================ */
  function launchConfetti(){
    const container = document.getElementById('confetti-container');
    const colors = ['#ff8fb3', '#ffd7e6', '#cdeaf9', '#a9dcf2', '#fff2c4', '#ffffff'];

    // Spread pieces across the whole shower window so new confetti keeps
    // appearing the entire time, instead of one quick wave that clears out
    const showerWindowSeconds = CONFIG.confettiDurationMs / 1000;

    for (let i = 0; i < CONFIG.confettiPieceCount; i++){
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';

      const size = 8 + Math.random() * 8;
      const fallDuration = 3 + Math.random() * 0;
      const delay = Math.random() * showerWindowSeconds; // staggered across the full window

      piece.style.left = `${Math.random() * 100}%`;
      piece.style.width = `${size}px`;
      piece.style.height = `${size * 0.4}px`;
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.animationDuration = `${fallDuration}s`;
      piece.style.animationDelay = `${delay}s`;

      container.appendChild(piece);
    }

    // Clean up a bit after the very last piece would finish falling,
    // so nothing gets cut off mid-fall
    setTimeout(() => { container.innerHTML = ''; }, CONFIG.confettiDurationMs + 3200);
  }
  </script>

</body>
</html>
